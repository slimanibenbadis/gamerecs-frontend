<main class="p-4">
  <h1>Hello, {{ title }}</h1>
  
  <!-- PrimeNG Button Examples -->
  <div class="flex gap-2 mt-4">
    <p-button label="Basic"></p-button>
    <p-button label="Click Me" severity="success" (onClick)="handleClick()"></p-button>
    <p-button label="Disabled" [disabled]="true"></p-button>
    <p-button label="With Icon" icon="pi pi-check"></p-button>
  </div>

  <router-outlet />
</main>
